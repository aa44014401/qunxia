<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>群俠壇說 · 文曲聖典</title>
<style>
:root{
  --shell:#23262b;
  --shell-edge:#15171a;
  --key:#3a3e46;
  --key-hi:#4a4f59;
  --lcd:#aebfa0;
  --lcd-dim:#9cad8e;
  --ink:#1c2916;
  --ink-soft:#3a4a32;
  --gold:#d9a441;
  --red:#8c3b2e;
  --blue:#2e5d8c;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{
  background:radial-gradient(ellipse at 50% 20%, #33373e 0%, #17191d 70%);
  font-family:"Microsoft JhengHei","PingFang TC","Noto Sans TC",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:14px;
}
.device{
  width:100%;max-width:760px;
  background:linear-gradient(160deg,#2b2f36,var(--shell) 40%,#1d2025);
  border:1px solid var(--shell-edge);
  border-radius:22px;
  box-shadow:0 22px 60px rgba(0,0,0,.6), inset 0 1px 0 rgba(255,255,255,.08);
  padding:16px 18px 14px;
}
.brand{
  display:flex;align-items:baseline;justify-content:space-between;
  padding:2px 6px 10px;
}
.brand .logo{color:var(--gold);font-weight:700;letter-spacing:.35em;font-size:14px;}
.brand .model{color:#8a8f99;font-size:11px;letter-spacing:.2em;}
.lcd{
  position:relative;
  background:var(--lcd);
  border-radius:8px;
  border:3px solid #0d0f11;
  box-shadow:inset 0 0 24px rgba(28,41,22,.35), inset 0 2px 6px rgba(0,0,0,.3);
  overflow:hidden;
}
.lcd::after{ /* 掃描線 */
  content:"";position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(0deg, rgba(28,41,22,.06) 0 1px, transparent 1px 3px);
}
.statusbar{
  display:flex;flex-wrap:wrap;gap:4px 14px;
  padding:8px 12px;font-size:12px;color:var(--ink);
  border-bottom:2px solid var(--ink);
  background:var(--lcd-dim);
  font-weight:700;
}
.statusbar span b{font-weight:700;}
.bar{display:inline-block;width:64px;height:8px;border:1px solid var(--ink);vertical-align:middle;margin-left:3px;background:transparent;}
.bar i{display:block;height:100%;background:var(--ink);}
#log{
  height:340px;overflow-y:auto;
  padding:12px 14px;font-size:14px;line-height:1.75;color:var(--ink);
  scrollbar-width:thin;scrollbar-color:var(--ink-soft) transparent;
}
#log p{margin-bottom:6px;}
#log .sys{color:var(--ink-soft);}
#log .talk{font-weight:700;}
#log .gain{color:var(--blue);font-weight:700;}
#log .dmg{color:var(--red);font-weight:700;}
#log .title{
  text-align:center;font-weight:700;letter-spacing:.3em;
  border-top:1px dashed var(--ink);border-bottom:1px dashed var(--ink);
  padding:4px 0;margin:8px 0;
}
#log p{animation:fadein .18s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion: reduce){#log p{animation:none;}}
#combatbar{
  border-top:2px solid var(--ink);
  background:var(--lcd-dim);
  padding:8px 12px;font-size:12px;font-weight:700;color:var(--ink);
  display:flex;flex-wrap:wrap;gap:4px 18px;align-items:center;
}
#combatbar .cbar{display:inline-block;width:110px;height:10px;border:1px solid var(--ink);vertical-align:middle;margin:0 4px;}
#combatbar .cbar i{display:block;height:100%;background:var(--ink);transition:width .25s ease;}
#combatbar .foe .cbar i{background:var(--red);}
#notice{
  position:absolute;inset:0;z-index:10;
  background:rgba(20,28,16,.55);
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.noticeCard{
  background:var(--lcd);border:3px solid var(--ink);border-radius:10px;
  max-width:520px;width:100%;max-height:90%;overflow-y:auto;
  padding:16px 18px;color:var(--ink);box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.noticeCard h3{text-align:center;letter-spacing:.4em;border-bottom:2px solid var(--ink);padding-bottom:8px;margin-bottom:10px;}
.noticeCard .ver{font-weight:700;margin:10px 0 4px;color:var(--red);}
.noticeCard li{margin-left:20px;line-height:1.7;font-size:13px;}
.noticeCard button{
  display:block;margin:14px auto 2px;font-family:inherit;font-weight:700;
  font-size:14px;color:#1d1405;background:linear-gradient(180deg,#e8bb5e,var(--gold));
  border:1px solid #101215;border-radius:8px;padding:8px 30px;cursor:pointer;
  box-shadow:0 2px 0 #0c0d0f;
}
.actions{
  border-top:2px solid var(--ink);
  background:var(--lcd-dim);
  padding:10px;display:flex;flex-wrap:wrap;gap:8px;
  min-height:64px;
}
.actions button, .creator button{
  font-family:inherit;font-size:13px;font-weight:700;color:var(--lcd);
  background:linear-gradient(180deg,var(--key-hi),var(--key));
  border:1px solid #101215;border-radius:8px;
  padding:8px 14px;cursor:pointer;
  box-shadow:0 2px 0 #0c0d0f;
  transition:transform .05s ease, box-shadow .05s ease;
}
.actions button:hover{background:linear-gradient(180deg,#565c68,var(--key-hi));}
.actions button:active{transform:translateY(2px);box-shadow:0 0 0 #0c0d0f;}
.actions button.gold{color:#1d1405;background:linear-gradient(180deg,#e8bb5e,var(--gold));}
.actions button.danger{background:linear-gradient(180deg,#a1503f,var(--red));}
.actions button:disabled{opacity:.45;cursor:not-allowed;}
.keysrow{
  display:flex;justify-content:center;gap:10px;padding-top:12px;
}
.keysrow i{
  width:34px;height:10px;border-radius:5px;background:#31353c;
  box-shadow:inset 0 1px 2px rgba(0,0,0,.6), 0 1px 0 rgba(255,255,255,.05);
}
/* 創角畫面 */
.creator{padding:16px 18px;color:var(--ink);font-size:14px;}
.creator h2{text-align:center;letter-spacing:.4em;margin-bottom:4px;}
.creator .sub{text-align:center;font-size:12px;color:var(--ink-soft);margin-bottom:14px;}
.creator .row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.creator label{width:64px;font-weight:700;}
.creator input[type=text]{
  font-family:inherit;font-size:14px;padding:6px 8px;flex:1;min-width:120px;
  background:transparent;border:2px solid var(--ink);border-radius:6px;color:var(--ink);
}
.creator .attr{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.creator .attr .nm{width:110px;font-weight:700;}
.creator .attr .val{width:34px;text-align:center;font-weight:700;font-size:16px;}
.creator .attr button{padding:2px 12px;font-size:15px;}
.creator .hint{font-size:12px;color:var(--ink-soft);margin:2px 0 12px;}
.creator .start{display:block;margin:14px auto 4px;font-size:16px;padding:10px 34px;}
.hidden{display:none!important;}
@media (max-width:520px){
  #log{height:300px;font-size:13px;}
  .device{padding:10px;}
  .statusbar{font-size:11px;gap:3px 10px;}
}
</style>
</head>
<body>
<div class="device">
  <div class="brand">
    <span class="logo">文曲聖典</span>
    <span class="model">WQX-1020 · 群俠壇說 v1.0</span>
  </div>
  <div class="lcd">
    <!-- 更新公告板 -->
    <div id="notice" class="hidden">
      <div class="noticeCard">
        <h3>江湖告示</h3>
        <div id="noticeBody"></div>
        <button onclick="closeNotice()">知道了，闖蕩去也</button>
      </div>
    </div>
    <!-- 創角 -->
    <div id="creator" class="creator">
      <h2>群俠壇說</h2>
      <div class="sub">—— 致敬文曲星經典《英雄壇說》 ——</div>
      <p style="margin-bottom:12px;">遠古大陸英雄壇的時空轉換裝置忽然發出低沉的召喚，十四歲的你被捲入光芒，睜眼已身在東方一片神秘大陸的中心——平安鎮。江湖傳言，暗黑勢力「幽冥壇」正在暗中滋長，剷除他們，便是你此行的使命。</p>
      <div class="row">
        <label>姓名</label>
        <input type="text" id="cName" maxlength="8" placeholder="無名俠客">
      </div>
      <div class="row">
        <label>性別</label>
        <button onclick="setGender('男')" id="gM">男</button>
        <button onclick="setGender('女')" id="gF">女</button>
        <span id="gShow" style="font-weight:700;"></span>
      </div>
      <div style="font-weight:700;margin:8px 0 6px;">先天屬性（剩餘點數：<span id="ptsLeft">15</span>）</div>
      <div class="attr"><span class="nm">膂力（攻擊）</span><button onclick="adj('str',-1)">−</button><span class="val" id="vstr">5</span><button onclick="adj('str',1)">＋</button></div>
      <div class="attr"><span class="nm">悟性（學武）</span><button onclick="adj('wis',-1)">−</button><span class="val" id="vwis">5</span><button onclick="adj('wis',1)">＋</button></div>
      <div class="attr"><span class="nm">根骨（氣血）</span><button onclick="adj('con',-1)">−</button><span class="val" id="vcon">5</span><button onclick="adj('con',1)">＋</button></div>
      <div class="attr"><span class="nm">身法（閃避）</span><button onclick="adj('agi',-1)">−</button><span class="val" id="vagi">5</span><button onclick="adj('agi',1)">＋</button></div>
      <div class="hint">※ 各門派拜師另有屬性門檻，配點時可得仔細掂量。</div>
      <button class="start gold" style="color:#1d1405;background:linear-gradient(180deg,#e8bb5e,#d9a441);" onclick="startGame()">踏 入 江 湖</button>
    </div>
    <!-- 主畫面 -->
    <div id="game" class="hidden">
      <div class="statusbar" id="statusbar"></div>
      <div id="log"></div>
      <div id="combatbar" class="hidden"></div>
      <div class="actions" id="actions"></div>
    </div>
  </div>
  <div class="keysrow"><i></i><i></i><i></i><i></i><i></i><i></i></div>
</div>

<script>
/* ============ 版本與更新公告 ============ */
const GAME_VERSION = "3.0.0";
const CHANGELOG = [
  {v:"3.0.0", date:"江湖曆·夏", items:[
    "新增【婚姻系統】：與心儀之人談心、贈禮，情投意合便可提親成家（茅山弟子受門規所限，敬請節哀）",
    "新增【奇遇事件】：閒逛與歷練時有機率觸發掃地老僧、山洞殘卷、仙緣異果等十餘種際遇",
    "新增【茅山符籙】：茅山弟子可畫雷符、護身符、神行符，戰鬥中祭出扭轉乾坤",
    "新增【自動存檔】：進度自動保存於此裝置，關閉重開可續玩；存檔碼仍可跨裝置備份",
    "新增【江湖告示】：每次版本更新，登入時展示更新內容（就是你現在看到的這個）",
    "舊版存檔完全相容，直接讀取自動升級，不影響任何進度"
  ]},
  {v:"2.0.0", date:"江湖曆·春", items:[
    "新增茅山派、獸王莊、赤蓮教三大門派",
    "新增「聯網·暗號」祕技系統",
    "戰鬥介面新增即時血條，日誌加入動效與自動裁剪"
  ]},
  {v:"1.0.0", date:"江湖曆·元年", items:[
    "《群俠壇說》初版問世：四大門派、村長任務、黑風寨與幽冥地宮故事線"
  ]}
];

/* ============ 存檔層（自動偵測 localStorage，失效則退回存檔碼） ============ */
const SAVE_KEY="qunxia_save_v1", SEEN_KEY="qunxia_seen_ver";
const store={ok:false};
try{ localStorage.setItem("__qx","1"); localStorage.removeItem("__qx"); store.ok=true; }catch(e){}

function migrate(o){ /* 舊版存檔升級：補齊新版欄位，進度不受影響 */
  if(!o.skills) o.skills={basic:0,inner:0,attack:0,light:0};
  if(!o.talismans) o.talismans={lei:0,hu:0,shen:0};
  if(!o.love) o.love={};
  if(o.married===undefined) o.married=null;
  if(!o.flags) o.flags={map:false,camp:false,palace:false,ending:false,taskCount:0};
  if(o.flags.homeDay===undefined) o.flags.homeDay=0;
  o.ver=GAME_VERSION;
  return o;
}
function saveGame(silent){
  if(!P) return;
  P.ver=GAME_VERSION;
  if(store.ok){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(P)); }catch(e){}
    if(!silent) log("【系統】進度已保存。","sys");
  } else if(!silent){
    log("【系統】此環境無法自動存檔，請至「存檔/讀檔」複製存檔碼備份。","sys");
  }
}
function loadSaved(){
  if(!store.ok) return null;
  try{
    const raw=localStorage.getItem(SAVE_KEY);
    if(!raw) return null;
    const o=JSON.parse(raw);
    if(!o||!o.name) return null;
    return migrate(o);
  }catch(e){ return null; }
}
/* ============ 線上補丁（資料驅動熱更新） ============
 * 將 patch.json 託管於任一靜態網址（如 GitHub Pages），填入 PATCH_URL。
 * 玩家每次開啟遊戲時自動拉取：數值平衡、公告皆可線上調整，
 * 無須重發遊戲檔、不影響玩家存檔。抓取失敗（離線）則靜默略過。
 * 安全設計：僅接受「資料」覆蓋（數值/文字），絕不執行遠端程式碼。 */
const PATCH_URL = "https://aa44014401.github.io/qunxia/patch.json"; // ← 例："https://你的帳號.github.io/qunxia/patch.json"
let PATCH_INFO = null;

async function loadPatch(){
  if(!PATCH_URL) return;
  try{
    const ctrl = new AbortController();
    const timer = setTimeout(()=>ctrl.abort(), 4000);
    const res = await fetch(PATCH_URL + "?t=" + Date.now(), {signal:ctrl.signal, cache:"no-store"});
    clearTimeout(timer);
    if(!res.ok) return;
    applyPatch(await res.json());
  }catch(e){ /* 離線或逾時：照常離線遊玩 */ }
}
function patchList(arr, byId, key){
  if(!byId) return;
  Object.keys(byId).forEach(id=>{
    const item = arr.find(x=>(x[key||"id"])===id);
    if(item && typeof byId[id]==="object") Object.assign(item, byId[id]);
  });
}
function applyPatch(p){
  if(!p || typeof p!=="object") return;
  const o = p.overrides || {};
  if(o.enemies) Object.keys(o.enemies).forEach(k=>{
    if(ENEMIES[k] && typeof o.enemies[k]==="object") Object.assign(ENEMIES[k], o.enemies[k]);
  });
  patchList(SHOP_FOOD,  o.food);
  patchList(SHOP_MED,   o.med);
  patchList(SHOP_SMITH, o.smith);
  patchList(GIFTS,      o.gifts, "name");
  if(o.talismans) Object.keys(o.talismans).forEach(k=>{
    if(TALIS[k] && typeof o.talismans[k]==="object") Object.assign(TALIS[k], o.talismans[k]);
  });
  if(Array.isArray(p.notes)){
    for(let i=p.notes.length-1; i>=0; i--){
      const n=p.notes[i];
      if(n && n.v && Array.isArray(n.items) && !CHANGELOG.some(c=>c.v===n.v)) CHANGELOG.unshift(n);
    }
  }
  PATCH_INFO = {version: p.version || "", applied: true};
}
function latestVer(){ return CHANGELOG.length ? CHANGELOG[0].v : GAME_VERSION; }

function showNotice(){
  const seen = store.ok ? (localStorage.getItem(SEEN_KEY)||"") : "";
  if(seen===latestVer()) return;
  const idx = CHANGELOG.findIndex(c=>c.v===seen);
  const list = idx===-1 ? CHANGELOG : CHANGELOG.slice(0,idx);
  const body=$("noticeBody");
  body.innerHTML = `<p style="font-size:13px;margin-bottom:6px;">諸位少俠：《群俠壇說》已更新至 <b>v${latestVer()}</b>${PATCH_INFO?"（含線上補丁）":""}，本次更新內容如下——</p>` +
    list.map(c=>`<div class="ver">v${c.v}（${c.date}）</div><ul>${c.items.map(i=>`<li>${i}</li>`).join("")}</ul>`).join("");
  $("notice").classList.remove("hidden");
}
function closeNotice(){
  $("notice").classList.add("hidden");
  if(store.ok){ try{ localStorage.setItem(SEEN_KEY, latestVer()); }catch(e){} }
}

/* ============ 基礎資料 ============ */
const TITLES = ["不堪一擊","毫不足慮","不足掛齒","初學乍練","勉勉強強","初窺門徑","初出茅廬","略知一二","普普通通","平平常常","平淡無奇","粗懂皮毛","半生不熟","登堂入室","略有小成","已有小成","鶴立雞群","駕輕就熟","青出於藍","融會貫通","心領神會","爐火純青","了然於胸","略有大成","已有大成","豁然貫通","非比尋常","出類拔萃","罕有敵手","技冠群雄","神乎其技","出神入化","傲視群雄","登峰造極","無與倫比","所向披靡","一代宗師","精深奧妙","神功蓋世","舉世無雙","驚世駭俗","撼天動地","震古爍今","超凡入聖","威鎮寰宇"];
function lvTitle(lv){ return TITLES[Math.min(TITLES.length-1, Math.floor(lv/5))]; }

const SECTS = {
  taiyi:{
    name:"太乙門", place:"太乙觀", master:"清嵐道長",
    intro:"太乙門乃玄門正宗，講究以柔克剛、後發先至。清嵐道長仙風道骨，武功震古爍今，門下弟子遍佈天下。",
    req:p=>true, reqText:"來者不拒（心術不正者除外）",
    inner:"太乙玄功", attack:"太乙拳", light:"雲行步",
    ult:{name:"四兩撥千斤", mult:2.4, cost:35, minLv:20,
      desc:"借力打力，引對方千鈞之力落空，再順勢一送，任你是誰也得跌個大跟頭。"}
  },
  hanmei:{
    name:"寒梅劍派", place:"寒梅峰", master:"梅孤白",
    intro:"寒梅劍派立派於西北苦寒之地，峰頂終年積雪，遍植梅樹。劍法古樸飄逸、劍點密集，攻勢快若朔風捲雪，獨步西域。",
    req:p=>p.agi>=8, reqText:"身法須達 8（劍走輕靈，遲鈍者難領其妙）",
    inner:"寒梅心法", attack:"寒梅劍法", light:"踏雪步",
    ult:{name:"梅開七度", mult:3.0, cost:45, minLv:20,
      desc:"按梅花七瓣之形，一瞬間刺出七劍，其勢快若閃電，令人無從招架。"}
  },
  jingang:{
    name:"金剛門", place:"千佛寺", master:"慧覺大師",
    intro:"金剛門源自千佛寺武僧一脈，外練筋骨皮、內練一口氣。金剛不壞功一成，尋常刀劍加身亦如撓癢。",
    req:p=>p.con>=8, reqText:"根骨須達 8（筋骨不堅，練之反傷己身）",
    inner:"金剛不壞功", attack:"伏虎拳", light:"千斤墜縱躍術",
    ult:{name:"金剛怒目", mult:2.6, cost:40, minLv:20,
      desc:"怒目一喝，聲若洪鐘，拳出如杵，正是「金剛怒目，所以降伏四魔」。"}
  },
  baihua:{
    name:"百花谷", place:"百花谷", master:"花千黛",
    intro:"百花谷只收女徒，谷中亂花疊翠、暗香浮動。谷主花千黛一雙素手曾令無數強敵飲恨落英繽紛之中。",
    req:p=>p.gender==="女"&&p.wis>=7, reqText:"僅收女徒，且悟性須達 7",
    inner:"玉女心經", attack:"落英掌", light:"凌波微步",
    ult:{name:"天女散花", mult:2.8, cost:40, minLv:20,
      desc:"掌影漫天如落英繽紛，花雨過處，敵人已中了七、八處掌力。"}
  },

/* ============ 玩家狀態 ============ */
let P = null;
let inCombat = null;
let creating = {str:5,wis:5,con:5,agi:5,gender:"男",pts:15};

function newPlayer(name,gender,a){
  return {
    ver:GAME_VERSION,
    name:name, gender:gender, age:14, day:1,
    str:a.str, wis:a.wis, con:a.con, agi:a.agi,
    hp:0, mp:0, exp:0, pot:30, money:20, food:80,
    sect:null,
    skills:{basic:0, inner:0, attack:0, light:0},
    talismans:{lei:0, hu:0, shen:0},
    love:{}, married:null,
    weapon:null, armor:null,
    flags:{map:false, camp:false, palace:false, ending:false, taskCount:0, homeDay:0},
    task:null,
    loc:"square"
  };
}
function maxHp(){ return 100 + P.con*10 + P.skills.inner*8; }
function maxMp(){ return 50 + P.con*4 + P.skills.inner*10; }
function mainAtkLv(){ return Math.max(P.skills.basic, P.skills.attack); }
function atkName(){ return P.skills.attack>=P.skills.basic && P.sect ? SECTS[P.sect].attack : "基本拳腳"; }
function playerAtk(){ return P.str*2 + mainAtkLv()*3 + (P.weapon?P.weapon.atk:0); }
function playerDef(){ return P.con + Math.floor(P.skills.inner*1.2) + (P.armor?P.armor.def:0); }
function heroTitle(){
  const lv = mainAtkLv();
  if(P.flags.ending) return "武林盟主";
  return lvTitle(lv);
}

/* ============ 介面工具 ============ */
const $ = id=>document.getElementById(id);
function log(html, cls){
  const box=$("log");
  const p=document.createElement("p");
  if(cls) p.className=cls;
  p.innerHTML=html;
  box.appendChild(p);
  while(box.children.length>150) box.removeChild(box.children[0]);
  box.scrollTop=box.scrollHeight;
}
function logTitle(t){ log(t,"title"); }
function clearLog(){ $("log").innerHTML=""; }
function status(){
  const s=$("statusbar");
  const hpP=Math.round(P.hp/maxHp()*100), mpP=Math.round(P.mp/maxMp()*100), fdP=Math.round(P.food);
  s.innerHTML =
    `<span><b>${P.name}</b>【${heroTitle()}】</span>`+
    `<span>氣血<span class="bar"><i style="width:${hpP}%"></i></span>${P.hp}/${maxHp()}</span>`+
    `<span>內力<span class="bar"><i style="width:${mpP}%"></i></span>${P.mp}/${maxMp()}</span>`+
    `<span>飽食<span class="bar"><i style="width:${fdP}%"></i></span></span>`+
    `<span>潛能 <b>${P.pot}</b></span>`+
    `<span>銀兩 <b>${P.money}</b></span>`+
    `<span>第${P.day}日·${P.age}歲</span>`;
}
function buttons(list){
  const a=$("actions"); a.innerHTML="";
  list.forEach(b=>{
    const btn=document.createElement("button");
    btn.textContent=b.t;
    if(b.cls) btn.className=b.cls;
    if(b.dis) btn.disabled=true;
    btn.onclick=b.f;
    a.appendChild(btn);
  });
}
function rand(n){ return Math.floor(Math.random()*n); }

/* ============ 創角 ============ */
function setGender(g){ creating.gender=g; $("gShow").textContent="已選："+g; }
function adj(k,d){
  if(d>0 && creating.pts<=0) return;
  if(d<0 && creating[k]<=1) return;
  if(d>0 && creating[k]>=20) return;
  creating[k]+=d; creating.pts-=d;
  $("v"+k).textContent=creating[k];
  $("ptsLeft").textContent=creating.pts;
}
function startGame(){
  const name = $("cName").value.trim() || "無名俠客";
  P = newPlayer(name, creating.gender, creating);
  P.hp=maxHp(); P.mp=maxMp();
  $("creator").classList.add("hidden");
  $("game").classList.remove("hidden");
  logTitle("楔 子");
  log("時空扭曲的強光散去，你發現自己站在一座熱鬧小鎮的廣場上。石碑上刻著三個大字——<b>平安鎮</b>。");
  log("路過的吟遊詩人李也白打了個哈哈：「今天的天氣真是……哈哈。」","talk");
  log("你摸了摸懷裡僅剩的二十兩碎銀。江湖路遠，先學一身武功再說。","sys");
  log("【提示】先去<b>村長家</b>領任務賺取潛能與經驗，再到門派拜師學藝。武功練到一定火候，村長自會告訴你暗黑勢力的下落。","sys");
  go("square");
}

/* ============ 時間與消耗 ============ */
function tick(cost){
  P.food = Math.max(0, P.food - cost);
  if(rand(4)===0) P.day++;
  if(P.day % 36 === 0 && rand(4)===0) P.age++;
  if(P.food<=0){
    P.hp = Math.max(1, P.hp - 10);
    log("你餓得前胸貼後背，氣血隱隱流失。快去客棧吃點東西吧！","dmg");
  }
  saveGame(true);
  status();
}

function fav(n){ return P.love[n]||0; }
function romanceButtons(B, n){
  const f=fav(n);
  B.push({t:`與${n}談心${f>0?`（好感${f}）`:""}`, f:()=>chatNpc(n)});
  if(f>=30) B.push({t:`贈禮給${n}`, f:()=>giftMenu(n)});
  if(f>=100) B.push({t:`向${n}提親`, cls:"gold", f:()=>propose(n)});
}
function chatNpc(n){
  const r=ROMANCE[n];
  if(!P.love[n]){
    P.love[n]=0;
    log(r.intro,"sys");
  }
  const gain=6+rand(6)+(P.wis>=10?2:0);
  P.love[n]=Math.min(120,fav(n)+gain);
  log(r.talk[rand(r.talk.length)],"talk");
  log(`（${n}的好感 +${gain}，目前 ${fav(n)}）`,"gain");
  tick(8); saveGame(true);
  go(r.where);
}
function giftMenu(n){
  clearLog();
  logTitle("贈 禮");
  log(`要送什麼給${n}呢？禮輕情意重……不過重禮情意更重。`,"sys");
  const B=GIFTS.map(g=>({t:`${g.name}（${g.price}兩·好感+${g.fav}）`, f:()=>{
    if(P.money<g.price){ log("囊中羞澀，先去賺點銀兩吧。","dmg"); return; }
    P.money-=g.price;
    P.love[n]=Math.min(120,fav(n)+g.fav);
    log(`${n}接過${g.name}，臉頰微紅：「你……有心了。」（好感 ${fav(n)}）`,"gain");
    saveGame(true); status();
  }}));
  B.push({t:"↩ 返回", f:()=>go(ROMANCE[n].where)});
  buttons(B);
}
function propose(n){
  if(P.sect==="maoshan"){
    log(`你鼓起勇氣正要開口，忽然想起師門戒律——茅山「不羨鴛鴦只羨仙」，不許婚娶！`,"dmg");
    log(`${n}見你欲言又止，奇道：「你想說什麼？」你打了個哈哈：「今天的天氣真是……哈哈。」`,"talk");
    log("（想成家的話……只能請掌門開恩，或者當初就別入茅山哪。）","sys");
    return;
  }
  if(mainAtkLv()<20){ log(`${n}的家人上下打量你：「習武之人連${lvTitle(20)}的火候都沒有，怎麼保護我家孩子？」（主修武功需達20級）`,"dmg"); return; }
  if(P.money<200){ log("提親總得備份像樣的聘禮——至少 200 兩。","dmg"); return; }
  P.money-=200;
  P.married={name:n};
  clearLog();
  logTitle("洞 房 花 燭");
  log(`吹吹打打，十里紅妝。你與${n}拜了天地，結為夫妻！`,"talk");
  log("賓客們鬧了半宿方散。從今往後，平安鎮上多了一處喚作「家」的地方。","sys");
  log("【提示】廣場新增「家」：可用飯（每日一次全飽）、與伴侶雙修（經驗潛能加成）。","gain");
  saveGame(true); status();
  buttons([{t:"回廣場", f:()=>go("square")}]);
}

function buyFood(it){
  if(P.money<it.price){ log("囊中羞澀，買不起啊。","dmg"); return; }
  P.money-=it.price;
  P.food=Math.min(100,P.food+it.food);
  if(it.hp) P.hp=Math.min(maxHp(),P.hp+it.hp);
  if(it.mp) P.mp=Math.min(maxMp(),P.mp+it.mp);
  log(`你吃下${it.name}，只覺${it.mp?"一股暖流直入丹田":"渾身舒坦"}。`,"gain");

}
function buyMed(it){

  P.money-=it.price;
  P.hp=Math.min(maxHp(),P.hp+it.hp);
  if(it.mp) P.mp=Math.min(maxMp(),P.mp+it.mp);

function buyGear(it){

const TASK_POOL = [
  {name:"替張大娘掃地", text:"張大娘家塵土滿天難呼吸，你掄起掃帚：「掃地掃地我掃地……」", type:"chore"},
  {name:"送信給李也白", text:"你把信送到吟遊詩人手上，他打了個哈哈：「今天的天氣真是，哈哈。」", type:"chore"},
  {name:"幫王鐵匠拉風箱", text:"你拉了一下午風箱，膀子都酸了，鐵匠直誇你有把子力氣。", type:"chore"},
  {name:"教訓潑皮無賴", enemy:"poopi", type:"fight"},
  {name:"驅逐惡犬", enemy:"dog", type:"fight"},
  {name:"剿滅山賊", enemy:"bandit", type:"fight"},
  {name:"緝拿江洋大盜", enemy:"robber", type:"fight"}
];
function takeTask(){
  let pool=TASK_POOL.filter(t=>{
    if(t.type==="chore") return true;
    const e=ENEMIES[t.enemy];
    return e.atk <= playerAtk()*1.4+20;
  });
  const t=pool[rand(pool.length)];
  P.task={...t, done:t.type==="chore"};
  log(`顧炎武：「有勞少俠——<b>${t.name}</b>。事成之後，必有酬謝。」`,"talk");
  if(t.type==="chore"){
    log(t.text,"sys");
    log("差事辦妥了！回報村長即可繳令。","gain");
    tick(10);
  } else {
    log(`【任務】去城郊樹林尋找並擊敗「${ENEMIES[t.enemy].name}」，再回村長家繳令。`,"sys");
  }
  go("chief");
}
function turnInTask(){
  if(!P.task.done){ log("顧炎武：「少俠，差事還沒辦妥呢。」","talk"); return; }
  P.flags.taskCount++;
  const bonus = P.task.type==="chore"?1:2;
  const exp=(20+rand(15))*bonus, pot=(8+rand(6))*bonus, money=(6+rand(10))*bonus;
  P.exp+=exp; P.pot+=pot; P.money+=money;
  log(`顧炎武撫掌大笑：「好！好一個少年英雄！」（經驗+${exp} 潛能+${pot} 銀兩+${money}）`,"gain");
  P.task=null;
  status(); go("chief");
}

function joinSect(k){
  P.sect=k;

  log(`你來到${s.place}，恭恭敬敬磕了三個響頭。`,"sys");

  go("sect");
}
function learnCost(lv){
  return Math.max(2, Math.ceil((lv+1)*20/(10+P.wis)));
}
function learnMenu(){
  const s=SECTS[P.sect];
  clearLog();
  logTitle("修煉武功");
  const rows=[
    {k:"basic", n:"基本拳腳"},
    {k:"inner", n:s.inner},
    {k:"attack",n:s.attack},
    {k:"light", n:s.light}
  ];
  rows.forEach(r=>{
    const lv=P.skills[r.k];
    log(`【${r.n}】${lv}級（${lvTitle(lv)}）— 升級需潛能 ${learnCost(lv)}`,"sys");
  });
  log(`目前潛能：${P.pot}`,"gain");
  log(`絕招【${s.ult.name}】：主修攻擊武功達 ${s.ult.minLv} 級自動領悟。${s.ult.desc}`,"sys");
  const B=rows.map(r=>({t:"練 "+r.n, f:()=>learn(r.k,r.n)}));
  B.push({t:"↩ 返回", f:()=>go("sect")});
  buttons(B);
}
function learn(k,n){
  const cost=learnCost(P.skills[k]);
  if(P.pot<cost){ log("潛能不足！多做任務、多打怪吧。","dmg"); return; }
  if(P.food<10){ log("肚子餓得咕咕叫，練不動了。","dmg"); return; }
  P.pot-=cost;
  P.skills[k]++;
  const lv=P.skills[k];
  log(`你苦練一番，【${n}】提升到 ${lv} 級（${lvTitle(lv)}）！`,"gain");
  if(k==="inner"){ P.hp=Math.min(P.hp+8,maxHp()); P.mp=Math.min(P.mp+10,maxMp()); }
  const s=SECTS[P.sect];
  if(k==="attack" && lv===s.ult.minLv){
    log(`電光石火之間，你福至心靈，竟領悟了本門絕學——【${s.ult.name}】！`,"title");
  }
  tick(4);
  learnMenu();
}
function meditate(){
  if(P.food<20){ log("氣息浮動，飢腸轆轆，如何入定？","dmg"); return; }
  const gain=5+Math.floor(P.wis/2)+rand(5);
  P.pot+=Math.floor(gain/2);
  P.mp=maxMp();
  P.exp+=gain;
  log(`你盤膝打坐，一炷香、兩炷香……周天運轉，內息綿綿不絕。（內力全滿，經驗+${gain}，潛能+${Math.floor(gain/2)}）`,"gain");
  tick(20);
}

function askMaster(){

  tick(6); saveGame(true);
}

/* ============ 戰鬥 ============ */
function startCombat(key, after){
  const t=ENEMIES[key];
  inCombat={
    key:key,
    name:t.name, hp:t.hp, maxhp:t.hp, atk:t.atk, def:t.def, agi:t.agi,
    exp:t.exp, pot:t.pot, money:t.money, boss:t.boss||0,
    after:after||null, fled:false
  };
  clearLog();
  logTitle("遭遇戰 · "+t.name);
  log(t.desc,"sys");
  combatUI();
}
function combatBar(){
  const e=inCombat, cb=$("combatbar");
  if(!e){ cb.classList.add("hidden"); return; }
  cb.classList.remove("hidden");
  const ep=Math.max(0,Math.round(e.hp/e.maxhp*100));
  const hp=Math.max(0,Math.round(P.hp/maxHp()*100));
  const mp=Math.max(0,Math.round(P.mp/maxMp()*100));
  cb.innerHTML =
    `<span class="foe">${e.name}<span class="cbar"><i style="width:${ep}%"></i></span>${Math.max(0,e.hp)}</span>`+
    `<span>你·氣血<span class="cbar"><i style="width:${hp}%"></i></span>${P.hp}</span>`+
    `<span>內力<span class="cbar"><i style="width:${mp}%"></i></span>${P.mp}</span>`;
}
function combatUI(){
  const e=inCombat;
  combatBar();
  const s=P.sect?SECTS[P.sect]:null;
  const hasUlt = s && P.skills.attack>=s.ult.minLv;
  const B=[
    {t:"攻擊（"+atkName()+"）", f:()=>playerTurn("atk")},
    {t:hasUlt?`絕招·${s.ult.name}（內力${s.ult.cost}）`:"絕招（未領悟）", cls:"gold", dis:!hasUlt||P.mp<(s?s.ult.cost:0), f:()=>playerTurn("ult")},
    {t:"運功療傷（內力30）", dis:P.mp<30, f:()=>playerTurn("heal")}
  ];
  if(P.sect==="maoshan"){
    B.push({t:`祭雷符×${P.talismans.lei}`, cls:"gold", dis:P.talismans.lei<1, f:()=>playerTurn("lei")});
    B.push({t:`護身符×${P.talismans.hu}`, dis:P.talismans.hu<1, f:()=>playerTurn("hu")});
    B.push({t:`神行符×${P.talismans.shen}`, dis:P.talismans.shen<1, f:()=>playerTurn("shen")});
  }
  B.push({t:"逃跑", cls:"danger", f:()=>playerTurn("flee")});
  buttons(B);
}
function playerTurn(act){
  const e=inCombat; if(!e) return;
  const s=P.sect?SECTS[P.sect]:null;
  let guarded=false;
  if(act==="flee"){
    if(e.boss===2){ log("玄冥子袍袖一拂封住地宮出口：「來了，還想走？」","dmg"); }
    else if(rand(100) < 40+P.agi*2+P.skills.light*2){
      log("你使出輕功，腳底抹油，一溜煙跑了。","sys");
      inCombat=null; combatBar(); go("square"); return;
    } else {
      log("想跑？沒跑掉！","dmg");
    }
  }
  else if(act==="shen"){
    P.talismans.shen--;
    if(e.boss===2){ log("神行符化作流光撞上地宮封禁，「啪」地碎了。玄冥子冷笑：「雕蟲小技。」","dmg"); }
    else {
      log("你祭出神行符，足下風雷乍起，眨眼已在三里之外！","gain");
      inCombat=null; combatBar(); saveGame(true); go("square"); return;
    }
  }
  else if(act==="lei"){
    P.talismans.lei--;
    const dmg=80+P.skills.inner*4+rand(20);
    e.hp-=dmg;
    log(`你咬破指尖祭出雷符，敕令一喝——霹靂一聲，紫電轟然劈落！（雷擊 ${dmg}，無視防禦）`,"gain");
  }
  else if(act==="hu"){
    P.talismans.hu--;
    const heal=60+P.skills.inner*3;
    P.hp=Math.min(maxHp(),P.hp+heal);
    guarded=true;
    log(`你祭出護身符，周身金光大盛！（氣血+${heal}，此回合敵人攻勢盡數被金光擋下）`,"gain");
  }
  else if(act==="heal"){
    P.mp-=30;
    const heal=40+P.skills.inner*4;
    P.hp=Math.min(maxHp(),P.hp+heal);
    log(`你逼出一口真氣護住心脈，傷勢好轉。（氣血+${heal}）`,"gain");
  }
  else {
    let dmg = playerAtk() + rand(12) - e.def;
    let moveTxt = `你使出【${atkName()}】`;
    if(act==="ult"){
      P.mp-=s.ult.cost;
      dmg = Math.floor((playerAtk()+rand(12))*s.ult.mult) - e.def;
      moveTxt = `你大喝一聲，使出絕招【${s.ult.name}】`;
    }
    if(rand(100) < e.agi*2 && act!=="ult"){
      log(`${moveTxt}，卻被${e.name}側身閃過！`,"sys");
    } else {
      dmg=Math.max(1,dmg);
      e.hp-=dmg;
      log(`${moveTxt}，正中${e.name}！（傷害 ${dmg}）`, act==="ult"?"gain":"");
    }
  }
  if(e.hp<=0){ winCombat(); return; }
  /* 敵方回合 */
  if(guarded){
    log(`${e.name}的攻勢撞上金光，紋絲不入！`,"sys");
  } else {
    const dodge = rand(100) < P.agi*1.5 + P.skills.light*1.5;
    if(dodge){
      log(`${e.name}撲了上來，你身形一晃，堪堪避開！`,"sys");
    } else {
      const dmg=Math.max(1, e.atk + rand(10) - playerDef());
      P.hp-=dmg;
      log(`${e.name}猛攻過來，你閃避不及！（受傷 ${dmg}）`,"dmg");
    }
  }
  if(P.hp<=0){ loseCombat(); return; }
  status();
  combatUI();
}
function winCombat(){
  const e=inCombat;
  P.exp+=e.exp; P.pot+=e.pot; P.money+=e.money;
  log(`${e.name}再也支撐不住，頹然倒地！`,"title");
  log(`（經驗+${e.exp} 潛能+${e.pot}${e.money?" 銀兩+"+e.money:""}）`,"gain");
  if(P.task && !P.task.done && P.task.enemy===e.key){
    P.task.done=true;
    log(`【任務】「${P.task.name}」已完成，回村長家繳令吧！`,"gain");
  }
  const after=e.after;
  inCombat=null; combatBar();
  tick(8);
  if(after) after();
  else buttons([{t:"繼續", f:()=>go(P.loc)}]);
}
function loseCombat(){
  const e=inCombat;
  inCombat=null;
  P.hp=1; P.money=Math.max(0,P.money-Math.floor(P.money*0.2));
  log(`你眼前一黑，倒了下去……`,"dmg");
  logTitle("大難不死");
  log("不知過了多久，你在悅來客棧的板床上悠悠醒轉，店小二端來一碗熱粥：「客官，是好心的過路人把你抬回來的。」（身上的銀兩少了兩成）","sys");
  P.loc="inn"; status();
  buttons([{t:"繼續", f:()=>go("inn")}]);
}
function huntForest(){
  if(rand(100)<25){ logTitle("奇 遇"); rollEvent(); return; }
  const pool=["dog","poopi","bandit"];
  startCombat(pool[rand(pool.length)]);
}
function huntDeep(){
  if(rand(100)<25){ logTitle("奇 遇"); rollEvent(); return; }
  const pool=["bandit","wolf","robber"];
  startCombat(pool[rand(pool.length)]);
}

/* ============ 故事線：黑風寨與幽冥地宮 ============ */
function raidCamp(){
  log("你深吸一口氣，飛身越過寨牆——","sys");
  startCombat("minion", ()=>{
    log("解決了門口的嘍囉，你直闖聚義廳！","sys");
    buttons([{t:"挑戰寨主·獨眼蛟", cls:"danger", f:()=>startCombat("boss1", campCleared)}]);
  });
}
function campCleared(){

  logTitle("黑風寨 · 破");
  log("獨眼蛟臨死前慘笑：「殺了我……嘿嘿……幽冥壇主會替我報仇……地宮……就在……」話未說完便斷了氣。","talk");
  log("你在聚義廳的密室裡發現一條幽深的地道，寒氣森森，直通地底——【幽冥地宮】已在廣場開啟！","gain");
  log("回村長家看看吧，顧炎武一定有話要說。","sys");
  buttons([{t:"繼續", f:()=>go("square")}]);
}
function raidPalace(){
  log("你點亮火摺子，踏入地宮。甬道兩側的骸骨訴說著幽冥壇的暴行。","sys");
  startCombat("guard", ()=>{
    log("擊倒護法，前方豁然開朗——白骨王座之上，玄冥子緩緩睜開眼睛。","sys");
    log("玄冥子：「數百年了……又是英雄壇送來的『英雄』。很好，本座正缺一個祭品。」","talk");
    buttons([{t:"決戰！玄冥子", cls:"danger", f:()=>startCombat("boss2", palaceCleared)}]);
  });
}
function palaceCleared(){
  P.flags.ending=true;
  clearLog();
  logTitle("終 章 · 武林大會");
  log("玄冥子仰天噴出一口黑血，難以置信地看著你：「不可能……本座苦修百年……」轟然倒地，地宮中的怨氣如潮水般退去。","sys");
  log("三個月後，武林大會在平安鎮召開。金遠見王朝的賞善罰惡使者當眾宣讀：","sys");
  log(`「${P.name}，年方${P.age}，剷除幽冥壇，救萬民於水火——賞善罰惡簿記首功，尊為<b>武林盟主</b>！」`,"talk");
  log("台下歡聲雷動。李也白擠上前打了個哈哈：「今天的天氣真是……哈哈！」你也笑了。","talk");
  log(`【全通關】用時 ${P.day} 日，主修【${atkName()}】${mainAtkLv()}級（${lvTitle(mainAtkLv())}）。`,"gain");
  log("江湖路遠，後會有期。你仍可繼續在這片大陸上行走，或重新開始一段新的人生。","sys");
  status();
  buttons([
    {t:"繼續行走江湖", f:()=>go("square")},
    {t:"重開新檔", cls:"danger", f:()=>location.reload()}
  ]);
}

/* ============ 聯網·暗號（作弊碼） ============ */
const CHEATS = [
  {code:"天罡地煞", desc:"四項先天屬性各 +10"},
  {code:"富甲天下", desc:"銀兩 +10000"},
  {code:"醍醐灌頂", desc:"潛能 +1000"},
  {code:"一步登天", desc:"所有已學武功 +10 級"},
  {code:"回滿",     desc:"氣血、內力、飽食全滿"},
  {code:"膂力30",   desc:"直接指定屬性數值，可用：膂力／悟性／根骨／身法／銀兩／潛能 + 數字"}
];
function cheatMenu(){
  clearLog();
  logTitle("聯網 · 暗號");
  log("你摸出懷中的傳訊玉符，江湖百曉生的聲音幽幽傳來：「暗號對上了，好處少不了你的。」","talk");
  CHEATS.forEach(c=>log(`「<b>${c.code}</b>」— ${c.desc}`,"sys"));
  buttons([
    {t:"輸入暗號", cls:"gold", f:()=>{
      const v=prompt("請輸入暗號：");
      if(v!=null) applyCheat(v.trim());
    }},
    {t:"↩ 返回", f:()=>go("square")}
  ]);
}
function applyCheat(v){
  if(!v){ return; }
  const m=v.match(/^(膂力|悟性|根骨|身法|銀兩|潛能)\s*(\d+)$/);
  if(m){
    const n=Math.min(99999, parseInt(m[2],10));
    const map={"膂力":"str","悟性":"wis","根骨":"con","身法":"agi","銀兩":"money","潛能":"pot"};
    const k=map[m[1]];
    if(k==="str"||k==="wis"||k==="con"||k==="agi") P[k]=Math.min(100,n);
    else P[k]=n;
    log(`暗號生效！${m[1]}已調整為 ${P[k]}。`,"gain");
  }
  else if(v==="天罡地煞"){
    ["str","wis","con","agi"].forEach(k=>P[k]=Math.min(100,P[k]+10));
    log("暗號生效！一道天罡之氣灌入四肢百骸，先天屬性各 +10！","gain");
  }
  else if(v==="富甲天下"){
    P.money+=10000;
    log("暗號生效！百曉生笑道：「拿去花，別客氣。」（銀兩 +10000）","gain");
  }
  else if(v==="醍醐灌頂"){
    P.pot+=1000;
    log("暗號生效！只覺腦中轟然一響，往日所學盡數貫通。（潛能 +1000）","gain");
  }
  else if(v==="一步登天"){
    Object.keys(P.skills).forEach(k=>{
      if(k==="basic"||P.sect) P.skills[k]+=10;
    });
    P.hp=Math.min(P.hp,maxHp()); P.mp=Math.min(P.mp,maxMp());
    log("暗號生效！所有已學武功齊升 10 級，當真一步登天！","gain");
    const s=P.sect?SECTS[P.sect]:null;
    if(s&&P.skills.attack>=s.ult.minLv) log(`你已具備施展絕招【${s.ult.name}】的火候！`,"title");
  }
  else if(v==="回滿"){
    P.hp=maxHp(); P.mp=maxMp(); P.food=100;
    log("暗號生效！氣血內力飽食俱已回滿，神完氣足。","gain");
  }
  else {
    log("百曉生搖搖頭：「這暗號……老夫沒聽過。」","dmg");
  }
  status();
}

/* ============ 狀態與存檔 ============ */
function showStat(){
  clearLog();
  logTitle("人物狀態");
  log(`${P.name}（${P.gender}，${P.age}歲）【${heroTitle()}】${P.sect?"— "+SECTS[P.sect].name+"弟子":"— 無門無派"}`);
  log(`膂力 ${P.str} ｜ 悟性 ${P.wis} ｜ 根骨 ${P.con} ｜ 身法 ${P.agi}`,"sys");
  log(`攻擊力 ${playerAtk()} ｜ 防禦力 ${playerDef()} ｜ 經驗 ${P.exp} ｜ 完成任務 ${P.flags.taskCount} 件`,"sys");
  const s=P.sect?SECTS[P.sect]:null;
  log(`基本拳腳 ${P.skills.basic}級（${lvTitle(P.skills.basic)}）`,"sys");
  if(s){
    log(`${s.inner} ${P.skills.inner}級（${lvTitle(P.skills.inner)}）`,"sys");
    log(`${s.attack} ${P.skills.attack}級（${lvTitle(P.skills.attack)}）${P.skills.attack>=s.ult.minLv?"— 已領悟【"+s.ult.name+"】":""}`,"sys");
    log(`${s.light} ${P.skills.light}級（${lvTitle(P.skills.light)}）`,"sys");
  }
  log(`武器【${P.weapon?P.weapon.name:"無"}】 護具【${P.armor?P.armor.name:"無"}】`,"sys");
  buttons([{t:"↩ 返回", f:()=>go("square")}]);
}
function saveMenu(){
  clearLog();
  logTitle("存檔 / 讀檔");
  if(store.ok) log("【自動存檔】已啟用：進度會自動保存在此裝置，關閉重開後可直接「繼續上次的江湖」。以下存檔碼供跨裝置備份用。","sys");
  else log("此環境不支援自動存檔，請以存檔碼保存進度：複製下方代碼，下次貼上讀取即可。","sys");
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(P))));
  const ta=document.createElement("textarea");
  ta.style.cssText="width:100%;height:70px;font-size:11px;background:transparent;border:2px solid #1c2916;border-radius:6px;color:#1c2916;padding:6px;font-family:monospace;";
  ta.value=code;
  $("log").appendChild(ta);
  buttons([
    {t:"立即存檔", cls:"gold", f:()=>{ saveGame(false); }},
    {t:"複製存檔碼", f:()=>{ta.select();document.execCommand("copy");log("已複製！","gain");}},
    {t:"讀取存檔碼", f:()=>{
      const v=prompt("請貼上存檔碼：");
      if(!v) return;
      try{
        const obj=JSON.parse(decodeURIComponent(escape(atob(v.trim()))));
        if(!obj.name) throw 0;
        P=migrate(obj); inCombat=null;
        saveGame(true);
        log("讀檔成功！存檔已自動升級至 v"+GAME_VERSION+"。歡迎回到江湖，"+P.name+"。","gain");
        status(); go("square");
      }catch(e){ log("存檔碼格式有誤，讀取失敗。","dmg"); }
    }},
    {t:"↩ 返回", f:()=>go("square")}
  ]);
}
/* ============ 開機初始化 ============ */
(async function boot(){
  await loadPatch();               // 先吃線上補丁（離線則略過）
  document.querySelector(".model").textContent = "WQX-1020 · 群俠壇說 v" + latestVer();
  showNotice();                    // 有新版本才會彈出江湖告示
  const saved=loadSaved();
  if(saved){
    const btn=document.createElement("button");
    btn.className="start";
    btn.style.cssText="display:block;margin:8px auto 0;font-size:14px;padding:8px 26px;";
    btn.textContent="▶ 繼續上次的江湖（"+saved.name+"·第"+saved.day+"日）";
    btn.onclick=function(){
      P=saved; inCombat=null;
      $("creator").classList.add("hidden");
      $("game").classList.remove("hidden");
      logTitle("重 返 江 湖");
      log("你伸了個懶腰，客棧窗外傳來熟悉的叫賣聲。江湖，我"+P.name+"又回來了！","sys");
      status(); go("square");
    };
    $("creator").appendChild(btn);
  }
})();
</script>
